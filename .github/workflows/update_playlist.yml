name: Daily Playlist Auto-Updater

on:
  schedule:
    # Runs at 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

permissions:
  contents: write # Required to allow GitHub Actions to commit and push changes back

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: Run Playlist Updater
      run: |
        python update_library.py

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update verified IPTV playlists [skip ci]"
        file_pattern: "*"
        commit_user_name: "GitHub Actions Bot"
        commit_user_email: "actions@github.com"
